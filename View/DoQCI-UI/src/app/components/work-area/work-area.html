<div class="w-full mt-10 p-8 rounded-2xl bg-white/70 backdrop-blur-md shadow-lg border border-white/40">

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6 justify-center">

    @for (page of pages; track $index) {

      <div
        class="bg-white rounded-lg shadow hover:shadow-xl transition p-2 flex flex-col items-center w-32"
      >

        <img
          [src]="page.thumbnail"
          class="w-full object-contain rounded"
        />

        <p class="text-sm mt-2 text-gray-600">
          Página {{page.pageNumber}}
        </p>

      </div>

    }

  </div>

</div>

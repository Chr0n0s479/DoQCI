<div class="flex flex-col items-center justify-center py-20">

    <p class="text-7xl font-bold mb-6">
        Procesa Archivos Pdf
    </p>

    <p class="text-2xl font-semibold mb-5">
        ¡Une, Separa y Reordena archivos PDF como quieras!
    </p>

    <!-- FILE UPLOADER -->
    <app-file-uploader [multiple]="true" [accept]="'.pdf'" (uploadStarted)="onUploadStarted()"
        (uploadFinished)="onFilesSelected($event)" [class.hidden]="isLoading || job">
    </app-file-uploader>


    @if (isLoading) {

    <div class="mt-10">
        <p class="text-lg">Procesando archivos...</p>
    </div>
    }

    <!-- LOADING -->



    <!-- WORK AREA -->
    @if (job) {
    <app-process-panel (process)="onProcess($event)">
    </app-process-panel>

    <app-work-area [job]="job!" (pagesChanged)="onPagesChanged($event)">
    </app-work-area>
    }

</div>
